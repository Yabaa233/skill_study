<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 天气</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(160deg, #1a2a4a 0%, #2d4a6a 40%, #3d5a7a 70%, #4a6a8a 100%);
    color: #e8eef4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 24px;
    overflow-x: hidden;
  }

  /* ─── 头部位置栏 ─── */
  .header {
    width: 100%;
    max-width: 380px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .city-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #aac;
    width: 34px; height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.14); color: #fff; transform: rotate(180deg); }

  /* ─── 主天气卡片 ─── */
  .weather-card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 28px 24px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .weather-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .weather-icon-big {
    font-size: 72px;
    line-height: 1;
    margin-bottom: 6px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .temp-main {
    font-size: 52px;
    font-weight: 200;
    letter-spacing: -2px;
  }
  .temp-unit { font-size: 22px; font-weight: 300; color: #9ab; vertical-align: super; }

  .weather-desc {
    font-size: 17px;
    color: #bcd;
    margin-top: 2px;
  }

  .temp-range {
    font-size: 13px;
    color: #89a;
    margin-top: 8px;
  }

  /* ─── 详情网格 ─── */
  .details-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 18px;
  }
  .detail-item {
    background: rgba(0,0,0,0.15);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: left;
  }
  .detail-label {
    font-size: 11px;
    color: #789;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .detail-value {
    font-size: 15px;
    font-weight: 600;
  }

  /* ─── 建议区 ─── */
  .suggestions {
    width: 100%;
    max-width: 380px;
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .suggestion-tag {
    background: rgba(100,180,255,0.12);
    border: 1px solid rgba(100,180,255,0.2);
    color: #9cf;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
  }
  .suggestion-tag.warn {
    background: rgba(255,180,80,0.12);
    border-color: rgba(255,180,80,0.25);
    color: #fc8;
  }
  .suggestion-tag.danger {
    background: rgba(255,100,100,0.12);
    border-color: rgba(255,100,100,0.25);
    color: #f88;
  }

  /* ─── 预报列表 ─── */
  .forecast-section {
    width: 100%;
    max-width: 380px;
    margin-top: 18px;
  }
  .section-title {
    font-size: 14px;
    color: #89a;
    margin-bottom: 10px;
  }
  .forecast-list {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .forecast-item {
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
    min-width: 78px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .forecast-day {
    font-size: 12px;
    color: #89a;
    margin-bottom: 6px;
  }
  .forecast-icon {
    font-size: 26px;
  }
  .forecast-temp {
    font-size: 13px;
    font-weight: 600;
    margin-top: 4px;
  }
  .forecast-precip {
    font-size: 10px;
    color: #6af;
    margin-top: 2px;
  }

  /* ─── 状态提示 ─── */
  .status-bar {
    margin-top: 16px;
    font-size: 11px;
    color: #567;
    text-align: center;
  }
  .loading-spinner {
    display: inline-block;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,60,60,0.1);
    border: 1px solid rgba(255,60,60,0.2);
    color: #f88;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    max-width: 380px;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div class="header">
    <span class="city-name" id="cityName">定位中...</span>
    <button class="refresh-btn" id="refreshBtn" title="刷新">↻</button>
  </div>

  <div class="weather-card">
    <div class="weather-icon-big" id="weatherIcon">🌍</div>
    <div class="temp-main"><span id="tempValue">--</span><span class="temp-unit">°C</span></div>
    <div class="weather-desc" id="weatherDesc">正在获取天气数据...</div>
    <div class="temp-range" id="tempRange"></div>

    <div class="details-grid" id="detailsGrid">
      <div class="detail-item"><div class="detail-label">体感温度</div><div class="detail-value" id="feelsLike">--</div></div>
      <div class="detail-item"><div class="detail-label">湿度</div><div class="detail-value" id="humidity">--</div></div>
      <div class="detail-item"><div class="detail-label">风向风力</div><div class="detail-value" id="windInfo">--</div></div>
      <div class="detail-item"><div class="detail-label">日出/日落</div><div class="detail-value" id="sunTime">--</div></div>
    </div>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="forecast-section">
    <div class="section-title">📅 未来几天</div>
    <div class="forecast-list" id="forecastList">
      <div style="color:#567;font-size:13px;padding:12px;">加载中...</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>

<script>
  // ─── 状态 ──────────────────────────────────────
  const $ = (id) => document.getElementById(id);

  let currentData = null;

  // 天气代码映射（精简版，用于 UI）
  const WX_ICONS = {
    200:'⛈️',201:'🌩️',202:'⛈️',210:'🌩️',211:'⛈️',212:'⛈️',221:'⛈️',
    230:'⛈️',231:'⛈️',232:'⛈️',
    300:'🌦️',301:'🌧️',302:'🌧️',310:'🌦️',311:'🌧️',312:'🌧️',313:'🌧️',314:'🌧️',321:'🌧️',
    500:'🌦️',501:'🌧️',502:'🌧️',503:'🌧️',504:'🌧️',
    511:'🌨️',520:'🌦️',521:'🌧️',522:'🌧️',531:'🌧️',
    600:'🌨️',601:'❄️',602:'❄️',611:'🌨️',612:'🌨️',613:'🌨️',
    615:'🌨️',616:'❄️',620:'🌨️',621:'❄️',622:'❄️',
    701:'🌫️',711:'🌫️',721:'🌫️',731:'🌪️',741:'🌫️',
    751:'🌪️',761:'🌪️',762:'🌋',771:'💨',781:'🌪️',
    800:'☀️',801:'🌤️',802:'⛅',803:'☁️',804:'☁️',
  };

  // ─── 数据加载 ─────────────────────────────────

  async function loadWeather() {
    setStatus('正在获取天气数据...', true);

    try {
      // 通过 IPC 调用插件主进程
      if (window.pluginAPI) {
        const res = await window.pluginAPI.invoke('geo:brief');

        if (!res?.success || !res.data) {
          throw new Error(res?.error || '返回数据为空');
        }

        currentData = res.data;
        renderWeather(currentData.weather, currentData.location);
        setStatus(`✅ 更新于 ${new Date().toLocaleTimeString('zh-CN')}`);
      } else {
        // 无 pluginAPI 时显示演示数据（开发模式）
        renderDemo();
        setStatus('⚠ 开发模式：使用模拟数据');
      }
    } catch (err) {
      showError(err.message);
      setStatus('❌ 加载失败，点击 ↻ 重试');
    }
  }

  function renderWeather(w, loc) {
    if (!w) return;

    // 城市名
    $('cityName').textContent = w.city || (loc ? loc.city : '未知位置');

    // 主天气
    $('weatherIcon').textContent = WX_ICONS[w.weather_code] || '🌡️';
    $('tempValue').textContent = w.temp ?? '--';
    $('weatherDesc').textContent = w.wInfo?.text || '--';
    $('tempRange').textContent = w.forecast?.[0]
      ? `${w.forecast[0].min_temp}°C ~ ${w.forecast[0].max_temp}°C`
      : '';

    // 详情
    $('feelsLike').textContent = `${w.feels_like ?? '--'}°C`;
    $('humidity').textContent = `${w.humidity ?? '--}%`;
    $('windInfo').textContent = w.wind_speed != null
      ? `${w.wind_speed} km/h`
      : '--';
    $('sunTime').textContent = `${w.sunrise ?? '--'} / ${w.sunset ?? '--'}`;

    // 建议
    renderSuggestions(w.suggestions);

    // 预报
    renderForecast(w.forecast || []);
  }

  function renderSuggestions(suggestions) {
    const el = $('suggestions');
    el.innerHTML = '';
    if (!suggestions || suggestions.length === 0) return;

    suggestions.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'suggestion-tag';
      tag.textContent = s.replace(/[^\s]+ /, ''); // 去掉 emoji prefix
      // 简单判断级别
      if (s.includes('高温') || s.includes('预警')) tag.classList.add('danger');
      else if (s.includes('注意') || s.includes('避免')) tag.classList.add('warn');
      el.appendChild(tag);
    });
  }

  function renderForecast(forecast) {
    const el = $('forecastList');
    if (forecast.length <= 1) {
      el.innerHTML = '<div style="color:#567;font-size:13px;padding:8px;">暂无更多预报</div>';
      return;
    }

    el.innerHTML = forecast.map((f, i) => {
      const dateStr = f.date;
      // 格式化日期
      const d = new Date(dateStr + 'T00:00:00');
      const dayLabel = i === 0 ? '今天'
        : i === 1 ? '明天'
        : `周${'日一二三四五六'[d.getDay()]}`;
      const icon = WX_ICONS[f.code] || '🌡️';

      return `
        <div class="forecast-item">
          <div class="forecast-day">${dayLabel}</div>
          <div class="forecast-icon">${icon}</div>
          <div class="forecast-temp">${f.min_temp}/${f.max_temp}°</div>
          ${f.precipitation_prob > 20 ? `<div class="forecast-precip">降水 ${f.precipitation_prob}%</div>` : ''}
        </div>`;
    }).join('');
  }

  function showError(msg) {
    const el = $('statusBar').parentNode;
    // 移除已有 error
    const existing = document.querySelector('.error-msg');
    if (existing) existing.remove();
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = msg;
    el.insertBefore(div, $('statusBar'));
  }

  function setStatus(msg, loading = false) {
    $('statusBar').innerHTML = loading
      ? `<span class="loading-spinner">⟳</span> ${msg}`
      : msg;
  }

  // 演示模式数据
  function renderDemo() {
    $('cityName').textContent = '深圳市';
    $('weatherIcon').textContent = '🌤️';
    $('tempValue').textContent = '26';
    $('weatherDesc').textContent = '多云';
    $('tempRange').textContent = '23°C ~ 29°C';
    $('feelsLike').textContent = '28°C';
    $('humidity').textContent = '75%';
    $('windInfo').textContent = '东北风 3级';
    $('sunTime').textContent = '06:02 / 18:47';

    const demoSugs = ['温度舒适，穿 T 恤即可', '湿度较高'];
    renderSugTags(demoSugs);

    const demoForecast = [
      { date: '', code: 802, min_temp: 23, max_temp: 29, precipitation_prob: 5 },
      { date: '', code: 500, min_temp: 22, max_temp: 27, precipitation_prob: 65 },
      { date: '', code: 800, min_temp: 21, max_temp: 28, precipitation_prob: 0 },
      { date: '', code: 801, min_temp: 22, max_temp: 29, precipitation_prob: 10 },
    ];
    renderForecast(demoForecast);
  }

  function renderSugTags(list) {
    const el = $('suggestions');
    el.innerHTML = '';
    list.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'suggestion-tag';
      tag.textContent = s;
      el.appendChild(tag);
    });
  }

  // ─── 事件 ──────────────────────────────────────

  $('refreshBtn').addEventListener('click', () => {
    document.querySelector('.error-msg')?.remove();
    loadWeather();
  });

  // 自动加载
  loadWeather();

  // 每 10 分钟自动刷新
  setInterval(loadWeather, 10 * 60 * 1000);
</script>
</body>
</html>
